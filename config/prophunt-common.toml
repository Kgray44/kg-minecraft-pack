#Prop Hunt Configuration
[freeze]
	#Maximum freeze time in seconds (how long a prop can stay frozen)
	# Default: 30
	# Range: 5 ~ 120
	maxFreezeTime = 30
	#Cooldown time in seconds after freeze is exhausted
	# Default: 30
	# Range: 5 ~ 120
	freezeCooldown = 30
	#Freeze regeneration multiplier when not sneaking (0 = no regen, 2 = 2x faster regen)
	# Default: 2
	# Range: 0 ~ 10
	freezeRegenRate = 2

[sound]
	#Interval in seconds between prop whistle sounds during PLAYING phase
	# Default: 30
	# Range: 10 ~ 120
	propSoundInterval = 30

[game]
	#Hide phase duration in seconds (time props have to hide before hunters are released)
	# Default: 30
	# Range: 10 ~ 120
	hidePhaseTime = 30
	#Total game time in seconds
	# Default: 300
	# Range: 60 ~ 1800
	gameTime = 300
	#Minimum number of players to start a game
	# Default: 2
	# Range: 1 ~ 10
	minPlayers = 2
	#Ratio of players that become hunters (0.33 = 1/3 of players)
	# Default: 0.33
	# Range: 0.1 ~ 0.9
	hunterRatio = 0.33
